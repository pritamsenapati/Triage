<!DOCTYPE html>
<html>
<head>
  <title>Hospital Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 2em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .login-header p {
      font-size: 0.95em;
      opacity: 0.9;
    }

    .login-icon {
      font-size: 3em;
      margin-bottom: 15px;
    }

    .login-content {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background: #f8f9ff;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: #999;
    }

    .login-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .login-button:active {
      transform: translateY(-1px);
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      border: 2px solid #f44336;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: shake 0.5s ease;
    }

    .error-message::before {
      content: "⚠";
      font-size: 1.3em;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-5px);
      }
      75% {
        transform: translateX(5px);
      }
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #4caf50;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .success-message::before {
      content: "✓";
      font-size: 1.3em;
    }

    .login-footer {
      padding: 20px 30px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      color: #666;
      font-size: 0.9em;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .back-link:hover {
      background: #f0f2ff;
      transform: translateX(-5px);
    }

    @media (max-width: 480px) {
      .login-container {
        max-width: 100%;
      }

      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 1.6em;
      }

      .login-content {
        padding: 30px 20px;
      }

      .login-icon {
        font-size: 2.5em;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">🏥</div>
      <h1>TRIAGE.AI</h1>
      <p>Hospital & Admin Portal</p>
    </div>

    <div class="login-content">
      <form method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username"
            name="username" 
            placeholder="Enter your username" 
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password"
            name="password" 
            placeholder="Enter your password" 
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="login-button">Login</button>
      </form>

      {% if error %}
      <div class="error-message">
        {{ error }}
      </div>
      {% endif %}
    </div>

    <div class="login-footer">
      <p>Secure Hospital Management System</p>
      <a href="/" class="back-link">⬅ Back to Home</a>
    </div>
  </div>
</body>
</html>
